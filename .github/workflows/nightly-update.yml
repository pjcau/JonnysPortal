name: Nightly Repos Update

on:
  schedule:
    - cron: "0 3 * * *" # Every night at 3:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update-repos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch repos data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-repos.mjs

      - name: Commit updated data
        id: commit_data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/repos.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update repos data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Vercel deploy hook
        if: steps.commit_data.outputs.changed == 'true' && secrets.VERCEL_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
